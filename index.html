<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Required</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .login-box { display: inline-block; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input { margin: 10px 0; padding: 8px; width: 80%; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Script Security Panel</h2>
        <p>You are trying to access the code.<br>Please login first.</p>
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Masukkan Username" required><br>
            <input type="password" name="password" placeholder="Masukkan Password" required><br>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
      </html>
